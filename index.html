<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miss Karol Revision - Portal de Alumnos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans p-4 flex flex-col items-center justify-center">

    <div class="w-full max-w-md space-y-4">
        
        <div id="panelPrincipal" class="bg-slate-950/60 p-6 rounded-2xl border border-slate-800 shadow-2xl transition-all duration-300">
            <div class="text-center mb-5">
                <span class="text-3xl">✨</span>
                <h1 class="text-xl font-bold text-pink-400 mt-1">Generador de Código QR</h1>
                <p class="text-xs text-slate-400">Genera tu código y muéstralo a la Miss para tu revisión</p>
            </div>

            <div class="space-y-4 text-xs">
                <div>
                    <label class="block text-slate-400 mb-1 font-semibold tracking-wide">Escribe tu Grupo:</label>
                    <input id="selectGrupo" type="text" placeholder="Ej: 4TPROG-AM" oninput="manejarEntradaGrupo()" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-white font-bold uppercase tracking-wide focus:outline-none focus:border-pink-500">
                </div>

                <div>
                    <label class="block text-slate-400 mb-1 font-semibold tracking-wide">Selecciona tu Nombre:</label>
                    <select id="selectAlumno" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-white font-medium focus:outline-none focus:border-pink-500">
                        <option value="">-- Escribe tu grupo primero --</option>
                    </select>
                </div>

                <div>
                    <label class="block text-slate-400 mb-1 font-semibold tracking-wide">Selecciona la Actividad / Tarea:</label>
                    <select id="selectActividad" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-white font-medium focus:outline-none focus:border-pink-500">
                        <option value="">-- Selecciona la actividad --</option>
                    </select>
                </div>

                <button onclick="generarCodigoQRAlumno()" class="w-full mt-2 bg-gradient-to-r from-pink-500 to-rose-600 hover:from-pink-600 hover:to-rose-750 text-white py-3 rounded-xl font-bold tracking-wide transition shadow-lg shadow-pink-500/10 cursor-pointer text-center block text-sm">
                    ⚡ Generar Código QR
                </button>
            </div>

            <div id="zonaQR" class="hidden mt-6 pt-5 border-t border-slate-800/80 text-center flex flex-col items-center justify-center">
                <span class="text-[10px] uppercase font-bold tracking-wider text-slate-400 mb-3 animate-pulse">Pasa al escritorio para escanear</span>
                <div class="bg-white p-4 rounded-2xl inline-block shadow-2xl">
                    <div id="qrcode"></div>
                </div>
                <span id="txtInfoQR" class="text-xs font-mono font-bold text-yellow-400 mt-3 bg-yellow-500/10 px-3 py-1 rounded-full border border-yellow-500/20"></span>
            </div>
        </div>

        <div id="mensajeExito" class="hidden bg-slate-950/80 border-2 border-green-500/30 p-8 rounded-2xl text-center shadow-2xl space-y-3 max-w-sm mx-auto animate-bounce">
            <div class="text-5xl">✅</div>
            <h2 class="text-lg font-bold text-green-400">¡Código Escaneado!</h2>
            <p class="text-xs text-slate-300">Tu actividad ha sido revisada y registrada con éxito por la Miss.</p>
            <button onclick="regresarAlGenerador()" class="mt-4 px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-xs font-semibold text-slate-300 transition cursor-pointer">
                Generar otra firma
            </button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDL0CybhUR13A8yd_S7HPUHoKwOzz96S6A",
            authDomain: "firmadigitalmaestra.firebaseapp.com",
            projectId: "firmadigitalmaestra",
            storageBucket: "firmadigitalmaestra.firebasestorage.app",
            messagingSenderId: "60938874327",
            appId: "1:60938874327:web:9c23f797239a5e02092f92"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let qrInstancia = null;
        let temporizadorGrupo = null;
        let desuscribirEscuchaQR = null; // Guardará el oyente de Firebase

        // Temporizador para esperar a que terminen de escribir el grupo entero
        window.manejarEntradaGrupo = function() {
            clearTimeout(temporizadorGrupo);
            temporizadorGrupo = setTimeout(() => {
                cargarDatosGrupo();
            }, 600);
        }

        // Descarga directa de alumnos y actividades del grupo escrito
        window.cargarDatosGrupo = async function() {
            const grupo = document.getElementById("selectGrupo").value.trim().toUpperCase();
            if(grupo.length < 4) return;

            try {
                // 1. Cargar Alumnos del grupo
                const qAl = query(collection(db, "alumnos"), where("grupo", "==", grupo));
                const snapAl = await getDocs(qAl);
                const selectAl = document.getElementById("selectAlumno");
                selectAl.innerHTML = '<option value="">-- Selecciona tu Nombre --</option>';
                
                let alumnos = [];
                snapAl.forEach(d => alumnos.push(d.data()));
                alumnos.sort((a,b) => a.nombre.localeCompare(b.nombre));
                alumnos.forEach(al => {
                    selectAl.innerHTML += `<option value="${al.nombre}">${al.nombre}</option>`;
                });

                // 2. Cargar TODAS las Actividades del grupo (Sin filtros de parciales que estorben)
                const qAct = query(collection(db, "actividades"), where("grupo", "==", grupo));
                const snapAct = await getDocs(qAct);
                const selectAct = document.getElementById("selectActividad");
                selectAct.innerHTML = '<option value="">-- Selecciona la actividad --</option>';

                let actividades = [];
                snapAct.forEach(d => actividades.push(d.data()));
                // Ordenar actividades alfabéticamente
                actividades.sort((a,b) => a.nombre.localeCompare(b.nombre));
                
                actividades.forEach(act => {
                    selectAct.innerHTML += `<option value="${act.nombre}">${act.nombre}</option>`;
                });

            } catch (e) {
                console.error("Error al conectar con Firebase: ", e);
            }
        }

        // Función para generar el código QR y quedarse escuchando si se escanea
        window.generarCodigoQRAlumno = function() {
            const grupo = document.getElementById("selectGrupo").value.trim().toUpperCase();
            const alumno = document.getElementById("selectAlumno").value;
            const actividad = document.getElementById("selectActividad").value;
            const zonaQR = document.getElementById("zonaQR");
            const contenedorQR = document.getElementById("qrcode");

            if(!grupo || !alumno || !actividad) {
                alert("Por favor rellena tu Grupo, Nombre y la Actividad.");
                return;
            }

            // Limpiar QR anterior y detener cualquier oyente previo activo
            contenedorQR.innerHTML = "";
            if (desuscribirEscuchaQR) desuscribirEscuchaQR();

            // Formato idéntico de lectura de la Maestra
            const datosQR = `Firma:${alumno}:${actividad}:${grupo}`;

            qrInstancia = new QRCode(contenedorQR, {
                text: datosQR,
                width: 160,
                height: 160,
                colorDark : "#0f172a",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            document.getElementById("txtInfoQR").innerText = actividad;
            zonaQR.classList.remove("hidden");

            // 🎯 ESCUCHA EN TIEMPO REAL: Detecta cuando cambies el estado a "Escaneado" desde tu app
            const qEscucha = query(
                collection(db, "codigos_qr"), 
                where("grupo", "==", grupo), 
                where("alumno", "==", alumno), 
                where("actividad", "==", actividad),
                where("estado", "==", "Escaneado")
            );

            desuscribirEscuchaQR = onSnapshot(qEscucha, (snapshot) => {
                if (!snapshot.empty) {
                    // Si encuentra un documento que coincide y ya fue escaneado, activa el éxito
                    document.getElementById("panelPrincipal").classList.add("hidden");
                    document.getElementById("mensajeExito").classList.remove("hidden");
                    
                    // Matamos el oyente para ahorrar datos de red
                    if (desuscribirEscuchaQR) {
                        desuscribirEscuchaQR();
                        desuscribirEscuchaQR = null;
                    }
                }
            });
        }

        // Permite regresar a la pantalla para que el alumno pida otra firma
        window.regresarAlGenerador = function() {
            document.getElementById("mensajeExito").classList.add("hidden");
            document.getElementById("zonaQR").classList.add("hidden");
            document.getElementById("selectActividad").value = ""; // Limpiar actividad anterior
            document.getElementById("panelPrincipal").classList.remove("hidden");
        }
    </script>
</body>
</html>
