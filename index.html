<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador QR - Alumnos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="w-full max-w-md bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700 text-center">
        
        <h1 class="text-xl font-black text-blue-400 mb-1 flex items-center justify-center gap-2">
            🔑 QR-Grade Token Alumno
        </h1>
        <p class="text-xs text-slate-400 mb-5">Selecciona tu tarea y genera tu firma digital.</p>

        <div class="space-y-3 text-left text-xs">
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-slate-400 mb-1 font-semibold">Grupo Académico:</label>
                    <input id="alGrupo" type="text" placeholder="4TPROG-Am" oninput="buscarTareasVigentes()" class="w-full p-2.5 bg-slate-700 border border-slate-600 rounded-xl text-white font-bold uppercase focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-slate-400 mb-1 font-semibold">Parcial Actual:</label>
                    <select id="alParcial" onchange="buscarTareasVigentes()" class="w-full p-2.5 bg-slate-700 border border-slate-600 rounded-xl text-white font-bold focus:outline-none focus:border-blue-500">
                        <option value="Parcial_1">1er Parcial</option>
                        <option value="Parcial_2">2do Parcial</option>
                        <option value="Parcial_3">3er Parcial</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-slate-400 mb-1 font-semibold">Tu Nombre Completo (Exacto):</label>
                <input id="alNombre" type="text" placeholder="Ej: JUAN PEREZ LOPEZ" class="w-full p-2.5 bg-slate-700 border border-slate-600 rounded-xl text-white font-semibold focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-slate-400 mb-1 font-semibold">Selecciona la Tarea a Entregar:</label>
                <select id="alActividadSelect" class="w-full p-2.5 bg-slate-700 border border-slate-600 rounded-xl text-white font-medium focus:outline-none focus:border-blue-500">
                    <option value="">⚠️ Escribe tu grupo arriba para cargar tareas...</option>
                </select>
            </div>
        </div>

        <button onclick="solicitarFirmaFiel()" class="mt-5 w-full bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-xl font-bold text-sm transition cursor-pointer">
            ✨ Generar Código QR Seguro
        </button>

        <div id="areaQR" class="hidden mt-6 p-4 bg-white rounded-2xl inline-block mx-auto">
            <div id="qrcode"></div>
        </div>
        <p id="txtToken" class="hidden mt-2 text-[10px] text-slate-500 font-mono break-all"></p>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDL0CybhUR13A8yd_S7HPUHoKwOzz96S6A",
            authDomain: "firmadigitalmaestra.firebaseapp.com",
            projectId: "firmadigitalmaestra",
            storageBucket: "firmadigitalmaestra.firebasestorage.app",
            messagingSenderId: "60938874327",
            appId: "1:60938874327:web:9c23f797239a5e02092f92"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // BUSCADOR AUTOMÁTICO DE TAREAS PARA EL SELECT DESPLEGABLE
        window.buscarTareasVigentes = async function() {
            const grupo = document.getElementById("alGrupo").value.trim().toUpperCase();
            const parcial = document.getElementById("alParcial").value;
            const selectAct = document.getElementById("alActividadSelect");

            if(!grupo) {
                selectAct.innerHTML = '<option value="">⚠️ Escribe tu grupo arriba para cargar tareas...</option>';
                return;
            }

            try {
                const q = query(collection(db, "actividades"), where("grupo", "==", grupo), where("parcial", "==", parcial));
                const snap = await getDocs(q);
                
                if(snap.empty) {
                    selectAct.innerHTML = '<option value="">❌ No hay tareas públicas para este parcial</option>';
                    return;
                }

                let opciones = '<option value="">📋 Selecciona una actividad...</option>';
                snap.forEach(doc => {
                    const data = doc.data();
                    opciones += `<option value="${data.nombre}">${data.nombre} (${data.valor} Pts)</option>`;
                });
                selectAct.innerHTML = opciones;
            } catch(e) {
                selectAct.innerHTML = '<option value="">❌ Error al conectar con tareas</option>';
            }
        }

        window.solicitarFirmaFiel = async function() {
            const grupo = document.getElementById("alGrupo").value.trim().toUpperCase();
            const alumno = document.getElementById("alNombre").value.trim();
            const actividad = document.getElementById("alActividadSelect").value;

            if(!grupo || !alumno || !actividad) { alert("Por favor completa todos tus campos y elige una tarea."); return; }

            const tokenUnico = `TK_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
            
            try {
                await setDoc(doc(db, "codigos_qr", tokenUnico), {
                    id: tokenUnico,
                    grupo: grupo,
                    alumno: alumno,
                    tipo: "Trabajo",
                    actividad: actividad,
                    estado: "Pendiente"
                });

                const divQr = document.getElementById("qrcode");
                divQr.innerHTML = "";
                new QRCode(divQr, { text: tokenUnico, width: 180, height: 180 });
                
                document.getElementById("areaQR").classList.remove("hidden");
                document.getElementById("txtToken").classList.remove("hidden");
                document.getElementById("txtToken").innerText = `ID Firma: ${tokenUnico}`;
            } catch(e) {
                alert("Error al conectar con la base de datos.");
            }
        }
    </script>
</body>
</html>
