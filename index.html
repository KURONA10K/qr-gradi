<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal del Alumno - QR-Grade Seguro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-950/60 border border-slate-800 rounded-3xl p-6 shadow-2xl backdrop-blur-md flex flex-col items-center">
        
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-600/10 text-blue-400 rounded-2xl mb-3 text-2xl">
                🔒
            </div>
            <h1 class="text-xl font-black tracking-tight text-white">Portal de Firmas Oficiales</h1>
            <p class="text-xs text-slate-400 mt-1">Genera pases criptográficos de un solo uso</p>
        </div>

        <div class="w-full space-y-4">
            
            <div>
                <label class="block text-[10px] uppercase font-bold tracking-wider text-slate-400 mb-1.5">1. Grupo Escolar:</label>
                <input id="inputGrupo" type="text" placeholder="Ej: 4TPROG-AM" oninput="cargarDatosGrupoOficial()" class="w-full p-3 bg-slate-900 border border-slate-800 rounded-xl text-white text-xs font-bold uppercase tracking-wide focus:outline-none focus:border-blue-500 transition-colors">
            </div>

            <div>
                <label class="block text-[10px] uppercase font-bold tracking-wider text-slate-400 mb-1.5">2. Parcial Activo:</label>
                <select id="selectParcial" onchange="cargarDatosGrupoOficial()" class="w-full p-3 bg-slate-900 border border-slate-800 rounded-xl text-white text-xs font-bold focus:outline-none focus:border-blue-500 transition-colors">
                    <option value="Parcial_1">1er Parcial</option>
                    <option value="Parcial_2">2do Parcial</option>
                    <option value="Parcial_3">3er Parcial</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] uppercase font-bold tracking-wider text-slate-400 mb-1.5">3. Selecciona tu Nombre:</label>
                <select id="selectAlumno" class="w-full p-3 bg-slate-900 border border-slate-800 rounded-xl text-white text-xs font-semibold focus:outline-none focus:border-blue-500 transition-colors">
                    <option value="">-- Escribe tu grupo arriba primero --</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] uppercase font-bold tracking-wider text-slate-400 mb-1.5">4. Selecciona la Actividad Oficial:</label>
                <select id="selectActividad" class="w-full p-3 bg-slate-900 border border-slate-800 rounded-xl text-white text-xs font-semibold focus:outline-none focus:border-blue-500 transition-colors">
                    <option value="">-- Escribe tu grupo arriba primero --</option>
                </select>
            </div>

            <button onclick="generarFirmaQR()" class="w-full mt-2 bg-blue-600 hover:bg-blue-500 text-white font-bold text-xs py-3 rounded-xl transition shadow-lg shadow-blue-600/20 active:scale-[0.98] cursor-pointer">
                🚀 GENERAR CÓDIGO QR SEGURO
            </button>
        </div>

        <div id="contenedorQR" class="hidden mt-6 pt-6 border-t border-slate-800/60 w-full flex flex-col items-center">
            <div class="bg-white p-4 rounded-2xl shadow-xl inline-block mb-3">
                <div id="qrcode"></div>
            </div>
            <p class="text-[11px] text-emerald-400 font-bold bg-emerald-500/10 border border-emerald-500/20 px-3 py-1.5 rounded-lg text-center max-w-[280px]">
                🎯 ¡Código único listo! Preséntalo ante la cámara de la maestra.
            </p>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDL0CybhUR13A8yd_S7HPUHoKwOzz96S6A",
            authDomain: "firmadigitalmaestra.firebaseapp.com",
            projectId: "firmadigitalmaestra",
            storageBucket: "firmadigitalmaestra.firebasestorage.app",
            messagingSenderId: "60938874327",
            appId: "1:60938874327:web:9c23f797239a5e02092f92"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let qrInstancia = null;

        // 🔄 SINCRONIZADOR EN TIEMPO REAL: Bloquea que inventen datos falsos
        window.cargarDatosGrupoOficial = async function() {
            const grupo = document.getElementById("inputGrupo").value.trim().toUpperCase();
            const parcial = document.getElementById("selectParcial").value;
            if(!grupo) return;

            const selectAl = document.getElementById("selectAlumno");
            const selectAct = document.getElementById("selectActividad");

            // Cargar Alumnos Inscritos del Grupo
            try {
                const qAl = query(collection(db, "alumnos"), where("grupo", "==", grupo));
                const snapAl = await getDocs(qAl);
                selectAl.innerHTML = '<option value="">-- Elige tu Nombre de la Lista --</option>';
                snapAl.forEach(d => {
                    const data = d.data();
                    selectAl.innerHTML += `<option value="${data.nombre}">${data.nombre}</option>`;
                });
            } catch(e) { console.log("Error cargando alumnos: ", e); }

            // Cargar Actividades Creadas por la Maestra
            try {
                const qAct = query(collection(db, "actividades"), where("grupo", "==", grupo), where("parcial", "==", parcial));
                const snapAct = await getDocs(qAct);
                selectAct.innerHTML = '<option value="">-- Elige la Tarea Oficial --</option>';
                snapAct.forEach(d => {
                    const data = d.data();
                    selectAct.innerHTML += `<option value="${data.nombre}">${data.nombre}</option>`;
                });
            } catch(e) { console.log("Error cargando actividades: ", e); }
        }

        // 🎫 MOTOR GENERADOR DE CONTROL INFALSIFICABLE
        window.generarFirmaQR = async function() {
            const grupo = document.getElementById("inputGrupo").value.trim().toUpperCase();
            const parcial = document.getElementById("selectParcial").value;
            const nombre = document.getElementById("selectAlumno").value;
            const actividad = document.getElementById("selectActividad").value;

            if (!nombre || !grupo || !actividad) {
                alert("⚠️ Por favor, selecciona tus opciones oficiales de las listas desplegables.");
                return;
            }

            // Estructura criptográfica idéntica que valida la maestra
            const idDocumento = `${grupo}_${parcial}_${nombre.replace(/\s+/g, '_')}_${actividad.replace(/\s+/g, '_')}`;

            try {
                // Sube el token inicializado a la base en la nube
                await setDoc(doc(db, "codigos_qr", idDocumento), {
                    alumno: nombre,
                    grupo: grupo,
                    parcial: parcial,
                    actividad: actividad,
                    tipo: "trabajo",
                    estado: "Generado",
                    fechaGeneracion: new Date()
                });

                // Construcción visual limpia del QR
                const divQR = document.getElementById("qrcode");
                divQR.innerHTML = "";
                
                qrInstancia = new QRCode(divQR, {
                    text: idDocumento,
                    width: 180,
                    height: 180,
                    colorDark: "#020617",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });

                document.getElementById("contenedorQR").classList.remove("hidden");
            } catch (error) {
                alert("❌ Fallo en el servidor de control: " + error.message);
            }
        }
    </script>
</body>
</html>
